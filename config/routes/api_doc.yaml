# API Documentation Routes - Must be imported before API routes
nelmio_api_doc_swagger_ui:
    path: /api/documentation
    methods: GET
    defaults:
        _controller: nelmio_api_doc.controller.swagger_ui

nelmio_api_doc_swagger:
    path: /api/documentation.json
    methods: GET
    defaults:
        _controller: nelmio_api_doc.controller.swagger

nelmio_api_doc_redoc:
    path: /api/documentation/redoc
    methods: GET
    defaults:
        _controller: nelmio_api_doc.controller.redoc
